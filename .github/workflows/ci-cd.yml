name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - .github/**
      - frontend/**
      - shared/**
      - src/**
      - migrations/**
      - package.json
      - package-lock.json
      - tsconfig.json
  pull_request:
    branches: [main]
    paths:
      - .github/**
      - frontend/**
      - shared/**
      - src/**
      - migrations/**
      - package.json
      - package-lock.json
      - tsconfig.json
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKER_NAME: pulsechat
  NODE_VERSION: "22"

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build frontend
        env:
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://pulsechat.hamidinelatifa.workers.dev' }}
        run: npm run build:frontend

      - name: Validate Worker bundle (dry-run)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --dry-run

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

  preview:
    name: Preview (PR)
    needs: validate
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Resolve preview alias
        id: alias
        shell: bash
        run: |
          branch="${{ github.head_ref }}"
          alias="$(echo "$branch" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/^-//;s/-$//' | cut -c1-63)"
          subdomain="${{ vars.WORKERS_DEV_SUBDOMAIN }}"
          if [ -z "$subdomain" ]; then
            echo "::error::Définissez la variable de dépôt WORKERS_DEV_SUBDOMAIN (ex. hamidinelatifa)"
            exit 1
          fi
          preview_url="https://${alias}-${{ env.WORKER_NAME }}.${subdomain}.workers.dev"
          echo "alias=$alias" >> "$GITHUB_OUTPUT"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Rebuild frontend for preview
        env:
          VITE_SITE_URL: ${{ steps.alias.outputs.preview_url }}
        run: npm run build:frontend

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ steps.alias.outputs.alias }} --message "PR #${{ github.event.pull_request.number }} @ ${{ github.sha }}"
          wranglerVersion: "4"

      - name: Smoke test preview
        shell: bash
        run: |
          url="${{ steps.alias.outputs.preview_url }}"
          echo "Testing $url/health"
          for attempt in 1 2 3 4 5; do
            if curl -fsS "$url/health" | grep -q '"status":"ok"'; then
              echo "Preview health check passed"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::Preview health check failed"
          exit 1

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.alias.outputs.preview_url }}
          DEPLOY_URL: ${{ steps.preview.outputs.deployment-url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const deployUrl = process.env.DEPLOY_URL;
            const marker = '<!-- pulsechat-preview -->';
            const body = [
              marker,
              '## PulseChat — Preview Cloudflare',
              '',
              '| | |',
              '|---|---|',
              `| **Branche** | \`${{ github.head_ref }}\` |`,
              `| **Preview stable** | ${previewUrl} |`,
              deployUrl ? `| **Version commit** | ${deployUrl} |` : null,
              `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
              '',
              '_Déployé via GitHub Actions — ne remplace pas la production._',
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Preview summary
        run: |
          echo "### Preview déployée" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL :** ${{ steps.alias.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy production
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Cloudflare
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --message "Production @ ${{ github.sha }}"
          wranglerVersion: "4"

      - name: Smoke test production
        shell: bash
        run: |
          url="${{ steps.deploy.outputs.deployment-url }}"
          if [ -z "$url" ]; then
            url="${{ vars.VITE_SITE_URL || 'https://pulsechat.hamidinelatifa.workers.dev' }}"
          fi
          echo "Testing $url/health"
          for attempt in 1 2 3 4 5; do
            if curl -fsS "$url/health" | grep -q '"status":"ok"'; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 5s..."
            sleep 5
          done
          echo "::error::Production health check failed"
          exit 1

      - name: Deployment summary
        run: |
          echo "### Production déployée" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ steps.deploy.outputs.deployment-url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Health** | OK |" >> "$GITHUB_STEP_SUMMARY"
